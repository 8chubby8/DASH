sentence=Build a DASH module (SYSTEM / LISTENER / ACCESSORY) with only your sensors and controls.
paragraph=Implements the locked DASH module SDK wire protocol — line framing, HELLO on DISCOVER, the install handshake, the SILENT/ACTIVE lifecycle with ROGER, and SYSTEM state reporting (on-activation dump + 5s heartbeat) — so a builder writes only their own hardware logic. The same library built-in and community modules use (the SDKable principle). See module-sdk.md.
